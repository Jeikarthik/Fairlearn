version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fairlens
      POSTGRES_PASSWORD: fairlens_secret
      POSTGRES_DB: fairlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairlens"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (message broker + cache) ─────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── FairLens API ───────────────────────────────────
  api:
    build:
      context: ./backend
      target: production
    ports:
      - "8000:8000"
    environment:
      FAIRLENS_DATABASE_URL: postgresql+psycopg2://fairlens:fairlens_secret@postgres:5432/fairlens
      FAIRLENS_CELERY_BROKER_URL: redis://redis:6379/0
      FAIRLENS_AUTH_DISABLED: "false"
      FAIRLENS_APP_ENV: production
      FAIRLENS_MAX_UPLOAD_SIZE_MB: "50"
      FAIRLENS_FILE_RETENTION_DAYS: "30"
      FAIRLENS_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      FAIRLENS_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OTEL_SERVICE_NAME: fairlens-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Celery Worker (audit computation) ──────────────
  worker:
    build:
      context: ./backend
      target: production
    command: >
      python -m celery -A app.core.tasks:celery_app
      worker --loglevel=info --concurrency=2
    environment:
      FAIRLENS_DATABASE_URL: postgresql+psycopg2://fairlens:fairlens_secret@postgres:5432/fairlens
      FAIRLENS_CELERY_BROKER_URL: redis://redis:6379/0
      FAIRLENS_AUTH_DISABLED: "false"
      FAIRLENS_APP_ENV: production
      FAIRLENS_FILE_RETENTION_DAYS: "30"
      FAIRLENS_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OTEL_SERVICE_NAME: fairlens-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ── Celery Beat (scheduled tasks: cleanup + re-audits) ──────────
  beat:
    build:
      context: ./backend
      target: production
    command: >
      python -m celery -A app.core.tasks:celery_app
      beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      FAIRLENS_DATABASE_URL: postgresql+psycopg2://fairlens:fairlens_secret@postgres:5432/fairlens
      FAIRLENS_CELERY_BROKER_URL: redis://redis:6379/0
      FAIRLENS_APP_ENV: production
      FAIRLENS_FILE_RETENTION_DAYS: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Frontend (nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  uploads:
  reports:
